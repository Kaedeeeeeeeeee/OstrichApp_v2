name: OstrichApp
options:
  bundleIdPrefix: com.ostrich
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: "NO"
  configs:
    Debug:
      # Simulator / CI 不需要签名
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: "NO"
      CODE_SIGNING_ALLOWED: "NO"
    Release:
      # 真机 / TestFlight 用 Automatic，团队自填 DEVELOPMENT_TEAM
      CODE_SIGN_STYLE: Automatic
      CODE_SIGNING_ALLOWED: "YES"

targets:
  OstrichApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OstrichApp
        excludes:
          - "**/.DS_Store"
      - path: OstrichApp/Resources
        buildPhase: resources
        optional: true
    info:
      path: OstrichApp/Info.plist
      properties:
        CFBundleDisplayName: 鸵鸟
        UIUserInterfaceStyle: Light  # v4 是浅色系
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleURLTypes:
          - CFBundleURLName: com.ostrich.app
            CFBundleURLSchemes: [ostrich]
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        NSLocationWhenInUseUsageDescription: "鸵鸟需要知道你在哪个城市，好和你看同一片天空"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true  # 本地 Convex dev deployment
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ostrich.app
        PRODUCT_NAME: 鸵鸟
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: OstrichApp/Info.plist

  OstrichAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OstrichAppTests
    dependencies:
      - target: OstrichApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ostrich.app.tests
        GENERATE_INFOPLIST_FILE: "YES"

  OstrichAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OstrichAppUITests
    dependencies:
      - target: OstrichApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ostrich.app.uitests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  OstrichApp:
    build:
      targets:
        OstrichApp: all
        OstrichAppTests: [test]
        OstrichAppUITests: [test]
    test:
      targets:
        - OstrichAppTests
        - OstrichAppUITests
      coverageEnabled: true
    run:
      config: Debug
    archive:
      config: Release
