name: OstrichApp
options:
  bundleIdPrefix: com.ostrich
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: "NO"
  configs:
    Debug:
      # Automatic 签名 + 用户 Apple Developer Team。Simulator 和真机都能跑。
      # CI 跑 xcodebuild build 时用 CODE_SIGNING_ALLOWED=NO 覆盖
      # （见 .github/workflows/ci-ios.yml）。
      # 如团队成员换其他 Apple ID，临时改这里或用 xcconfig 覆盖。
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: Y4FV6WUU4V
      CODE_SIGNING_ALLOWED: "YES"
    Release:
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: Y4FV6WUU4V
      CODE_SIGNING_ALLOWED: "YES"

targets:
  OstrichApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OstrichApp
        excludes:
          - "**/.DS_Store"
      - path: OstrichApp/Resources
        buildPhase: resources
        optional: true
    info:
      path: OstrichApp/Info.plist
      properties:
        CFBundleDisplayName: 鸵鸟
        UIUserInterfaceStyle: Light  # v4 是浅色系
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleURLTypes:
          - CFBundleURLName: com.ostrich.app
            CFBundleURLSchemes: [ostrich]
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        NSLocationWhenInUseUsageDescription: "鸵鸟需要知道你在哪个城市，好和你看同一片天空"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true  # 本地 Convex dev deployment
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ostrich.app
        PRODUCT_NAME: 鸵鸟
        # Swift module 必须用 ASCII 名（@testable import OstrichApp）。
        # 不显式设置时 PRODUCT_MODULE_NAME 会跟随 PRODUCT_NAME = "鸵鸟"，
        # 导致测试 target 无法解析模块。
        PRODUCT_MODULE_NAME: OstrichApp
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: OstrichApp/Info.plist

  OstrichAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OstrichAppTests
    dependencies:
      - target: OstrichApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ostrich.app.tests
        GENERATE_INFOPLIST_FILE: "YES"
        # PRODUCT_NAME 是中文 “鸵鸟”，所以 .app 包名也是 “鸵鸟.app/鸵鸟”。
        # xcodegen 默认按 target 名给 TEST_HOST，需要显式覆盖。
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/鸵鸟.app/鸵鸟"
        BUNDLE_LOADER: "$(TEST_HOST)"

  OstrichAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OstrichAppUITests
    dependencies:
      - target: OstrichApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ostrich.app.uitests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  OstrichApp:
    build:
      targets:
        OstrichApp: all
        OstrichAppTests: [test]
        OstrichAppUITests: [test]
    test:
      targets:
        - OstrichAppTests
        - OstrichAppUITests
      coverageEnabled: true
    run:
      config: Debug
    archive:
      config: Release
