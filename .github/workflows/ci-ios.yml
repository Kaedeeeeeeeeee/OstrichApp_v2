name: CI · iOS

on:
  pull_request:
    paths:
      - 'ios/**'
      - 'shared/**'
      - '.github/workflows/ci-ios.yml'
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'shared/**'

concurrency:
  group: ci-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Test (iPhone 17 / iOS 26.5)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate xcodeproj
        working-directory: ios
        run: xcodegen generate

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Build
        working-directory: ios
        run: |
          xcodebuild build \
            -project OstrichApp.xcodeproj \
            -scheme OstrichApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Test (单元测试)
        working-directory: ios
        run: |
          xcodebuild test \
            -project OstrichApp.xcodeproj \
            -scheme OstrichApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            -only-testing:OstrichAppTests \
            CODE_SIGNING_ALLOWED=NO

      # SwiftLint 暂未引入。Day 2-3 由 ws/devops 加进来
      # - name: SwiftLint
      #   run: swiftlint --strict
