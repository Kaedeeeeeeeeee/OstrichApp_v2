name: CI · iOS

on:
  pull_request:
    paths:
      - 'ios/**'
      - 'shared/**'
      - '.github/workflows/ci-ios.yml'
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'shared/**'

concurrency:
  group: ci-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS Simulator generic)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode + SDK
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | head -10

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate xcodeproj
        working-directory: ios
        run: xcodegen generate

      - name: Build (compile only, no run)
        working-directory: ios
        run: |
          xcodebuild build \
            -project OstrichApp.xcodeproj \
            -scheme OstrichApp \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

